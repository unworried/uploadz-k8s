services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: images_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  image-service:
    build: ./image-service
    ports:
      - 3001:3001
    environment:
      DB_HOST: postgres
      DB_NAME: images_db
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy

  catalogue-service:
    build: ./catalogue-service
    ports:
      - 3002:3002
    environment:
      DB_HOST: postgres
      DB_NAME: images_db
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: